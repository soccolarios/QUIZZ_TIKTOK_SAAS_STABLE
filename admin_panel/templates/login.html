<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Quiz - Connexion</title>
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .login-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-primary);
        }
        .login-box {
            width: 100%;
            max-width: 380px;
            padding: 40px;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-lg);
        }
        .login-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 32px;
        }
        .login-logo-icon {
            width: 36px;
            height: 36px;
            background: var(--accent);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .login-logo-text {
            font-size: 18px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: -0.3px;
        }
        .login-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 6px;
        }
        .login-subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .login-form .form-group {
            margin-bottom: 16px;
        }
        .login-form label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .login-form input {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color var(--transition);
        }
        .login-form input:focus {
            border-color: var(--accent);
        }
        .login-error {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            background: var(--error-muted);
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: var(--radius);
            color: var(--error);
            font-size: 13px;
            margin-bottom: 18px;
        }
        .login-btn {
            width: 100%;
            padding: 11px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background var(--transition);
            margin-top: 8px;
        }
        .login-btn:hover { background: var(--accent-hover); }
        .login-btn:active { opacity: 0.9; }
    </style>
</head>
<body>
<div class="login-page">
    <div class="login-box">
        <div class="login-logo">
            <div class="login-logo-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            </div>
            <span class="login-logo-text">TikTok Quiz</span>
        </div>

        <div class="login-title">Connexion admin</div>
        <div class="login-subtitle">Acces restreint au panneau d'administration</div>

        {% if error %}
        <div class="login-error">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <form class="login-form" method="POST" action="/login">
            <div class="form-group">
                <label>Nom d'utilisateur</label>
                <input type="text" name="username" autocomplete="username" placeholder="admin" autofocus required>
            </div>
            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" autocomplete="current-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="login-btn">Se connecter</button>
        </form>
    </div>
</div>
</body>
</html>
